// Lucide icon helper (line icons, ~1.75 stroke) — matches the DS iconography spec.
function Icon({ n, s = 16, color, style = {}, sw = 1.75 }) {
  const r = React.useRef(null);
  React.useEffect(() => {
    const el = r.current;
    if (!el) return;
    el.innerHTML = '';
    const i = document.createElement('i');
    i.setAttribute('data-lucide', n);
    el.appendChild(i);
    if (window.lucide) window.lucide.createIcons({ attrs: { width: s, height: s, 'stroke-width': sw } });
  }, [n, s, sw]);
  return h('span', { ref: r, style: { display: 'inline-flex', alignItems: 'center', justifyContent: 'center', color: color || 'currentColor', flex: 'none', ...style } });
}
