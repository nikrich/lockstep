name = "lockstep"
main = "src/index.ts"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]

# --- D1: source of truth (users, repos, tokens, LOCKS — transactional) ---
[[d1_databases]]
binding = "DB"
database_name = "lockstep"
database_id = "33479072-8ae3-4edf-9cbe-1771e80ef61f"
migrations_dir = "migrations"

# --- KV: hot-path session/token cache (eventually consistent — never locks) ---
[[kv_namespaces]]
binding = "SESSIONS"
id = "4c6cc828c8984acb8aa2677f80189eef"

# --- R2: blob storage. Customers bring their OWN bucket; this is the default. ---
[[r2_buckets]]
binding = "BLOBS"
bucket_name = "lockstep-blobs"              # `wrangler r2 bucket create lockstep-blobs`

[vars]
# Public base URL of the deployed Worker (used to build OAuth redirect URIs).
BASE_URL = "https://lockstep.nikrich.workers.dev"

# Secrets (set via `wrangler secret put <NAME>`, never commit):
#   GITHUB_CLIENT_ID / GITHUB_CLIENT_SECRET
#   GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET
#   SESSION_SECRET            (random 32+ bytes; signs session cookies)
#
# For a customer's bring-your-own R2 bucket accessed via the S3 API
# (presigned URLs), set these too:
#   R2_ACCOUNT_ID / R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY / R2_BUCKET
